services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: focusflow_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: ${MONGODB_URL}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    networks:
      - focusflow_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: focusflow_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - focusflow_net

networks:
  focusflow_net:
    driver: bridge

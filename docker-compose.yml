services:
  mongo:
    image: mongo:7
    container_name: focusflow_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - focusflow_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: focusflow_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://focusflow_mongo:27017/focusflow
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      - mongo
    networks:
      - focusflow_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: focusflow_frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - focusflow_net

networks:
  focusflow_net:
    driver: bridge

volumes:
  mongo_data:

# ─────────────────────────────────────────────────────────────────────────────
# Publish Wiki
#
# Copies all markdown files from docs/wiki/ into the GitHub wiki git repo.
#
# Trigger: manually via "Run workflow" on GitHub Actions tab.
#
# Pre-requisite: The GitHub wiki must be initialized first (create any
# page manually via the GitHub wiki tab — this initialises the underlying
# git repo). After that, this workflow keeps it in sync automatically.
# ─────────────────────────────────────────────────────────────────────────────

name: Publish Wiki

on:
  workflow_dispatch:   # manual trigger from GitHub Actions UI

jobs:
  publish:
    name: Publish docs/wiki to GitHub Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Clone wiki repo
        run: |
          git clone "https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki-repo

      - name: Copy wiki pages
        run: |
          cp docs/wiki/*.md wiki-repo/

      - name: Commit and push
        working-directory: wiki-repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "docs: sync wiki from docs/wiki/ [skip ci]"
          git push

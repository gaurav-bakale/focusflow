# ─────────────────────────────────────────────────────────────────────────────
# FocusFlow CI/CD Pipeline
# ─────────────────────────────────────────────────────────────────────────────

name: FocusFlow CI/CD

on:
  push:
    branches: [main, develop, karans, feature/task-board-calendar]
    tags: ['v*']
  pull_request:
    branches: [main, karans]

jobs:

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint
  # ──────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: flake8 — app (including authentication package)
        working-directory: ./backend
        run: flake8 app/ --max-line-length=100 --exclude=__pycache__

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2 — Test
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────────────────
      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: Jest with coverage
        working-directory: ./frontend
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

      # ── Backend ───────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Seed demo user
        # Run from project root so dotenv path resolution is consistent
        env:
          PYTHONPATH: backend
          MONGODB_URL: mongodb://localhost:27017/focusflow_test
          JWT_SECRET: test-secret-key
          JWT_EXPIRE_MINUTES: '60'
        run: python backend/seed_demo_user.py

      - name: pytest with coverage
        # Run from project root so `tests` package is importable without
        # extra sys.path manipulation — PYTHONPATH=backend makes `app`
        # importable while the CWD (project root) makes `tests` importable.
        env:
          PYTHONPATH: backend
          MONGODB_URL: mongodb://localhost:27017/focusflow_test
          JWT_SECRET: test-secret-key
          JWT_EXPIRE_MINUTES: '60'
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_ACTIONS: 'true'
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-config=backend/.coveragerc \
            --cov-report=xml:backend/coverage.xml \
            --cov-report=term-missing \
            -p no:warnings

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build
  #
  # Always runs to validate Dockerfiles on every branch.
  # Push to Docker Hub only when ALL of the following are true:
  #   • on the main branch, AND
  #   • DOCKER_USERNAME secret is configured in repo settings
  #
  # We resolve push vs. build-only in a dedicated step because:
  #   • secrets context cannot be referenced in step `if:` conditions
  #   • passing it through an env var + step output is the recommended pattern
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Resolve whether to push and what tags to use.
      # Secrets cannot be read in `if:` expressions, so we pass DOCKER_USERNAME
      # as an env var and check it in the shell. The outputs drive all later steps.
      - name: Resolve push target
        id: docker
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
        run: |
          # Strip any whitespace/newlines the secret value may carry
          CLEAN_USER=$(printf '%s' "$DOCKER_USER" | tr -d '[:space:]')
          if [[ "${{ github.ref }}" == "refs/heads/main" && -n "$CLEAN_USER" ]]; then
            echo "push=true"                                                    >> $GITHUB_OUTPUT
            echo "backend_tag=${CLEAN_USER}/focusflow-backend:latest"          >> $GITHUB_OUTPUT
            echo "frontend_tag=${CLEAN_USER}/focusflow-frontend:latest"        >> $GITHUB_OUTPUT
            echo "Building + pushing to Docker Hub as ${CLEAN_USER}"
          else
            echo "push=false"                          >> $GITHUB_OUTPUT
            echo "backend_tag=focusflow-backend:ci"   >> $GITHUB_OUTPUT
            echo "frontend_tag=focusflow-frontend:ci" >> $GITHUB_OUTPUT
            echo "Building only (smoke-test) — no push"
          fi

      - name: Log in to Docker Hub
        if: steps.docker.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ steps.docker.outputs.push == 'true' }}
          tags: ${{ steps.docker.outputs.backend_tag }}

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ steps.docker.outputs.push == 'true' }}
          tags: ${{ steps.docker.outputs.frontend_tag }}

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy  (PENDING: configure deployment target)
  # ──────────────────────────────────────────────────────────────────────────
  # deploy:
  #   name: Deploy
  #   runs-on: ubuntu-latest
  #   needs: build
  #   if: github.ref == 'refs/heads/main'
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: echo "Configure deployment target here."

  # ──────────────────────────────────────────────────────────────────────────
  # GATE JOB — required status check for branch protection
  # Lint + Test + Build must all pass. Deploy is pending and excluded.
  # ──────────────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Check required jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "Lint failed — blocking merge."
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test failed — blocking merge."
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "Build failed — blocking merge."
            exit 1
          fi
          echo "All required checks passed (lint + test + build)."

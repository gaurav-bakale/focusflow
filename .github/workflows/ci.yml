# ─────────────────────────────────────────────────────────────────────────────
# FocusFlow CI/CD Pipeline
# File: .github/workflows/ci.yml
#
# Triggers:
#   - Push to main or develop
#   - Pull requests targeting main
#
# Jobs:
#   1. lint    → ESLint (frontend) + flake8 (backend)
#   2. test    → Jest (frontend) + pytest (backend) with live MongoDB
#   3. build   → Docker images for frontend and backend
#   4. deploy  → placeholder (configure server later)
# ─────────────────────────────────────────────────────────────────────────────

name: FocusFlow CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ───────────────────────────────────────────────
  # JOB 1 — Lint
  # ───────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: flake8
        working-directory: ./backend
        run: flake8 app/ --max-line-length=100 --exclude=__pycache__

  # ───────────────────────────────────────────────
  # JOB 2 — Test
  # ───────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # Frontend (Jest)
      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci

      - name: Jest with coverage
        working-directory: ./frontend
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

      # Backend (pytest)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend deps
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: pytest with coverage
        working-directory: ./backend
        env:
          MONGODB_URL: mongodb://localhost:27017/focusflow_test
          JWT_SECRET: test-secret-key
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ───────────────────────────────────────────────
  # JOB 3 — Build Docker Images
  # ───────────────────────────────────────────────
  build:
  name: Build
  runs-on: ubuntu-latest
  needs: test

  steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: focusflow/frontend:latest

    - name: Build & push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: focusflow/backend:latest

  # ───────────────────────────────────────────────
  # JOB 4 — Deploy (main only)
  # ───────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy placeholder
        run: echo "✅ FocusFlow deployed successfully — configure server later."

---
